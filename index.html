<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DKA Test — Davlat Kadastrlari Asoslari</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --card: #1e1e28;
    --border: #2e2e40;
    --accent: #e8c547;
    --accent2: #5b8af0;
    --accent3: #e05c7a;
    --text: #e8e6f0;
    --muted: #7a7a99;
    --correct: #4caf7d;
    --wrong: #e05c7a;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid texture background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,197,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,197,71,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── SCREEN WRAPPER ── */
  .screen { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

  /* ── LANDING ── */
  #landing { gap: 48px; }

  .logo-area { text-align: center; }
  .logo-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: block;
  }
  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, #fff 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-sub {
    font-size: 15px;
    color: var(--muted);
    margin-top: 12px;
    font-style: italic;
    font-weight: 300;
  }

  .variant-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    width: 100%;
    max-width: 580px;
  }

  .variant-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .variant-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(232,197,71,0.07));
    opacity: 0;
    transition: opacity 0.25s;
  }
  .variant-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(232,197,71,0.12); }
  .variant-card:hover::before { opacity: 1; }

  .variant-num {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
    opacity: 0.9;
  }
  .variant-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .variant-range {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    font-style: italic;
  }

  .info-bar {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .info-bar span::before { content: '◆ '; color: var(--accent); font-size: 8px; }

  /* ── QUIZ SCREEN ── */
  #quiz { display: none; flex-direction: column; align-items: center; padding: 20px; gap: 0; }

  .quiz-header {
    width: 100%;
    max-width: 780px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .quiz-variant-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    background: rgba(232,197,71,0.1);
    border: 1px solid rgba(232,197,71,0.3);
    padding: 6px 14px;
    border-radius: 40px;
  }
  .quiz-progress-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .btn-back {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-back:hover { color: var(--text); border-color: var(--muted); }

  .progress-bar {
    width: 100%;
    max-width: 780px;
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    margin-bottom: 40px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .question-card {
    width: 100%;
    max-width: 780px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 40px;
    margin-bottom: 20px;
    animation: fadeUp 0.35s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: block;
  }
  .q-text {
    font-size: 18px;
    font-weight: 400;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 32px;
  }

  .options-list { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    text-align: left;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    font-size: 15px;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: all 0.2s ease;
    line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(91,138,240,0.07);
    transform: translateX(3px);
  }
  .option-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .option-btn.correct { border-color: var(--correct); background: rgba(76,175,125,0.1); }
  .option-btn.correct .option-letter { color: var(--correct); border-color: var(--correct); background: rgba(76,175,125,0.15); }
  .option-btn.wrong { border-color: var(--wrong); background: rgba(224,92,122,0.1); }
  .option-btn.wrong .option-letter { color: var(--wrong); border-color: var(--wrong); background: rgba(224,92,122,0.15); }
  .option-btn:disabled { cursor: default; }

  .feedback-box {
    margin-top: 16px;
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeUp 0.25s ease;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct-fb { background: rgba(76,175,125,0.12); border: 1px solid rgba(76,175,125,0.3); color: #8de0b6; }
  .feedback-box.wrong-fb { background: rgba(224,92,122,0.1); border: 1px solid rgba(224,92,122,0.25); color: #f0a0b4; }
  .feedback-box strong { display: block; margin-bottom: 6px; }

  .next-btn {
    margin-top: 24px;
    display: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px 32px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
    align-self: flex-end;
  }
  .next-btn:hover { background: #f5d86a; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,197,71,0.3); }
  .next-btn.show { display: block; }

  /* ── RESULT SCREEN ── */
  #result { display: none; gap: 32px; }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
    max-width: 560px;
    width: 100%;
  }
  .result-score {
    font-family: 'Playfair Display', serif;
    font-size: 80px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-score.great { color: var(--correct); }
  .result-score.ok { color: var(--accent); }
  .result-score.low { color: var(--wrong); }
  .result-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .result-msg {
    font-size: 16px;
    color: var(--muted);
    font-style: italic;
    font-weight: 300;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 32px;
  }
  .stat { text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; }
  .stat-num.c { color: var(--correct); }
  .stat-num.w { color: var(--wrong); }
  .stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

  .btn-group { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn-primary {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px 28px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: #f5d86a; }
  .btn-secondary {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: none;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 14px 28px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

  @media (max-width: 600px) {
    .variant-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .question-card { padding: 24px 20px; }
    .q-text { font-size: 16px; }
    .quiz-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<!-- LANDING -->
<div class="screen" id="landing">
  <div class="logo-area">
    <span class="logo-tag">Buxoro DTU · 2026</span>
    <div class="logo-title">DKA TEST</div>
    <div class="logo-sub">Davlat Kadastrlari Asoslari · 101 savol</div>
  </div>

  <div class="variant-grid" id="variantGrid">
    <!-- cards injected by JS -->
  </div>

  <div class="info-bar">
    <span>Har variant: 25–26 ta savol</span>
    <span>Savollar aralashtirilgan</span>
    <span>4 ta variant</span>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz">
  <div class="quiz-header">
    <button class="btn-back" onclick="goHome()">← Bosh sahifa</button>
    <span class="quiz-variant-badge" id="variantBadge">VARIANT 1</span>
    <span class="quiz-progress-text" id="progressText">1 / 25</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="question-card" id="questionCard">
    <span class="q-number" id="qNumber">SAVOL 01</span>
    <div class="q-text" id="qText"></div>
    <div class="options-list" id="optionsList"></div>
    <div class="feedback-box" id="feedbackBox"></div>
  </div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Keyingi savol →</button>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="result-card">
    <div class="result-score" id="resultScore"></div>
    <div class="result-label">ball / <span id="totalQ"></span></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-stats">
      <div class="stat"><div class="stat-num c" id="correctCount"></div><div class="stat-label">To'g'ri</div></div>
      <div class="stat"><div class="stat-num w" id="wrongCount"></div><div class="stat-label">Noto'g'ri</div></div>
    </div>
    <div class="btn-group">
      <button class="btn-primary" id="retryBtn" onclick="retryVariant()">Qayta urinish</button>
      <button class="btn-secondary" onclick="goHome()">Variant tanlash</button>
    </div>
  </div>
</div>

<script>
// ─── ALL 101 QUESTIONS ───
const ALL_QUESTIONS = [
  // 1
  { q: "Kadastr tushunchasiga ko'ra, u ko'chmas mulkka bo'lgan huquqlar to'g'risidagi yozuvlarni o'z ichiga olgan qanday tizim hisoblanadi?",
    correct: "Zamonaviy yer axborot tizimi (modern land information system)",
    wrong: ["Milliy geografik ma'lumotlar bazasi", "Davlat mulk reestri tizimi", "Ko'chmas mulk elektron arxivi"] },

  // 2
  { q: "Muayyan obyekt haqida davriy yoki uzluksiz kuzatish orqali tuziladigan ma'lumotlar to'plami nima deb ataladi?",
    correct: "Kadastr",
    wrong: ["Rejestr", "Inventarizatsiya", "Monitoring"] },

  // 3
  { q: "O'rta asrlarda Amir Temur davrida yer maydonini o'lchash va hosilni hisobga olish qaysi asarda bayon etilgan?",
    correct: "Temur tuzuklari",
    wrong: ["Boburnoma", "Avesto", "Qonunlar majmuasi"] },

  // 4
  { q: "Amir Temur davrida o'lchash natijalarini tekshirgan maxsus davlat xodimlari va oliy mansabdorlar hay'ati qanday atalgan?",
    correct: "Holisa hay'ati",
    wrong: ["Devoni oliy", "Vazirlar kengashi", "Mirob hay'ati"] },

  // 5
  { q: "O'zbekistonda hozirgi kunga qadar davlat kadastrining necha xil turi mavjud?",
    correct: "20 ta",
    wrong: ["10 ta", "27 ta", "15 ta"] },

  // 6
  { q: "Davlat kadastrlari yagona tizimini (DKYT) yuritish tartibi qaysi organ tomonidan belgilanadi?",
    correct: "O'zbekiston Respublikasi Vazirlar Mahkamasi",
    wrong: ["Prezident Administratsiyasi", "Oliy Majlis", "Kadastr agentligi"] },

  // 7
  { q: "Davlat kadastrlarini yuritishning asosiy prinsiplaridan biri qaysi yagona tizimni qo'llashni nazarda tutadi?",
    correct: "Fazoviy koordinatalarning yagona tizimi (WGS-84)",
    wrong: ["UTM koordinata tizimi", "SK-42 koordinata tizimi", "Gauss-Krüger tizimi"] },

  // 8
  { q: "Madaniy meros obyektlari davlat kadastrini yuritishga mas'ul tashkilot qaysi?",
    correct: "Madaniyat va turizm vazirligi huzuridagi Madaniy meros agentligi",
    wrong: ["O'zbekiston Badiiy akademiyasi", "Fan va texnologiyalar vazirligi", "Arxitektura va qurilish vazirligi"] },

  // 9
  { q: "O'rmon kadastrini yuritish qaysi davlat tashkilotining zimmasiga yuklatilgan?",
    correct: "O'zbekiston Respublikasi O'rmon xo'jaligi agentligi",
    wrong: ["Ekologiya vazirligi", "Qishloq xo'jaligi vazirligi", "Tabiatni muhofaza qilish qo'mitasi"] },

  // 10
  { q: "Avtomobil yo'llari davlat kadastrini yuritishga mas'ul bo'lgan organ qaysi?",
    correct: "O'zbekiston Respublikasi Avtomobil yo'llari davlat qo'mitasi",
    wrong: ["Transport vazirligi", "Kommunal xizmatlar agentligi", "Shaharsozlik qo'mitasi"] },

  // 11
  { q: "Temir yo'llar davlat kadastri qaysi tashkilot tomonidan yuritiladi?",
    correct: "'O'zbekiston temir yo'llari' davlat-aksiyadorlik kompaniyasi",
    wrong: ["Transport vazirligi", "Iqtisodiyot vazirligi", "Infratuzilma qo'mitasi"] },

  // 12
  { q: "Tabiiy xavf yuqori bo'lgan zonalar davlat kadastrini yuritishda seysmik holatlar bo'yicha qaysi institut mas'ul?",
    correct: "O'zbekiston Respublikasi Fanlar akademiyasining Seysmologiya instituti",
    wrong: ["Geologiya instituti", "Gidrologiya instituti", "Tabiiy ofatlar bo'yicha davlat qo'mitasi"] },

  // 13
  { q: "O'simlik dunyosi obyektlari davlat kadastrini yurituvchi vakolatli organ qaysi?",
    correct: "O'zbekiston Respublikasi Ekologiya, atrof-muhitni muhofaza qilish va iqlim o'zgarishi vazirligi",
    wrong: ["Qishloq xo'jaligi vazirligi", "O'rmon xo'jaligi agentligi", "Fan va texnologiyalar vazirligi"] },

  // 14
  { q: "Fazoviy ma'lumotlar to'g'risidagi O'zbekiston Respublikasi Qonuni qachon qabul qilingan?",
    correct: "2021-yil 23-iyul (O'RQ-702)",
    wrong: ["2018-yil 15-may", "2019-yil 30-dekabr", "2020-yil 1-yanvar"] },

  // 15
  { q: "Milliy geografik axborot tizimi fazoviy ma'lumotlar milliy infratuzilmasining qanday tizimi hisoblanadi?",
    correct: "Tarkibiy qismi (avtomatlashtirilgan tizim)",
    wrong: ["Mustaqil tizimi", "Rahbar organi", "Moliyalashtiruvchi tizimi"] },

  // 16
  { q: "Fazoviy ma'lumotlar milliy infratuzilmasini yuritishda moliyalashtirish manbai qaysi?",
    correct: "O'zbekiston Respublikasi Davlat byudjetidan ajratilgan mablag'lar",
    wrong: ["Xalqaro tashkilotlar granti", "Mahalliy hokimiyat byudjeti", "Xususiy investitsiyalar"] },

  // 17
  { q: "Fazoviy ma'lumotlar sohasidagi maxsus vakolatli davlat organi qaysi?",
    correct: "Kadastr agentligi (Iqtisodiyot va moliya vazirligi huzuridagi)",
    wrong: ["Statistika agentligi", "Davlat arxivi", "Geodeziya va kartografiya markazi"] },

  // 18
  { q: "Fazoviy ma'lumotlar milliy infratuzilmasi administratori ishonchsiz ma'lumotlarni necha ish kunida e'lon qilishi kerak?",
    correct: "Uch ish kuni mobaynida",
    wrong: ["Bir ish kuni ichida", "Besh ish kuni ichida", "O'n ish kuni ichida"] },

  // 19
  { q: "Fazoviy ma'lumotlar ishlab chiqaruvchilari yaratilgan ma'lumotlarni necha kun ichida administratorga taqdim etishi shart?",
    correct: "15 (o'n besh) kun muddatida",
    wrong: ["7 kun muddatida", "30 kun muddatida", "45 kun muddatida"] },

  // 20
  { q: "Davlat yer kadastri ma'lumotlari qanday ikki turga bo'linadi?",
    correct: "Asosiy (birlamchi) va joriy ma'lumotlarga",
    wrong: ["Raqamli va qog'oz ma'lumotlarga", "Ochiq va maxfiy ma'lumotlarga", "Doimiy va vaqtinchalik ma'lumotlarga"] },

  // 21
  { q: "Qishloq xo'jaligi yerlari unumdorligini baholashda qanday ko'rsatkichdan foydalaniladi?",
    correct: "Tuproq boniteti (tuproq bonitirovkasi)",
    wrong: ["Yer kadastri raqami", "Yer maydonining koeffitsienti", "Yer rentabelligi indeksi"] },

  // 22
  { q: "Yer uchastkalari bo'yicha yer miqdorini hisobga olishning qanday usullari mavjud?",
    correct: "Geodezik usul va kartometrik usul",
    wrong: ["Fotogrammetrik va aerosuratga olish usullari", "Lidar va radar usullari", "Raqamli va analog usullar"] },

  // 23
  { q: "Tuproq bonitirovkasi necha balli shkala bo'yicha o'tkaziladi?",
    correct: "100 (yuz) balli shkala bo'yicha",
    wrong: ["10 balli shkala bo'yicha", "50 balli shkala bo'yicha", "200 balli shkala bo'yicha"] },

  // 24
  { q: "Kadastr uchun suratga olishning qanday asosiy uslublari mavjud?",
    correct: "Aerofotogeodezik va yer ustida bajariladigan (yer-geodezik) uslublar",
    wrong: ["Termal va ultrabinafsha uslublar", "Gidrologik va geologik uslublar", "Lazer va infraqizil uslublar"] },

  // 25
  { q: "Davlat yer kadastrini yuritish borasidagi ishlar qanday mablag'lar hisobidan moliyalanadi?",
    correct: "O'zbekiston Respublikasi Davlat byudjetidan va huquqlarni ro'yxatdan o'tkazganlik uchun undiriladigan mablag'lardan",
    wrong: ["Faqat xususiy investitsiyalardan", "Xalqaro grantlar hisobidan", "Mahalliy hokimiyat byudjetidan"] },

// ─── VARIANT CONFIG ───
const VARIANTS = [
  { num: 1, label: "I - VARIANT", range: "Savollar 1–26", color: "#e8c547", indices: range(0,26) },
  { num: 2, label: "II - VARIANT", range: "Savollar 27–51", color: "#5b8af0", indices: range(26,51) },
  { num: 3, label: "III - VARIANT", range: "Savollar 52–76", color: "#e05c7a", indices: range(51,76) },
  { num: 4, label: "IV - VARIANT", range: "Savollar 77–101", color: "#4caf7d", indices: range(76,101) }
];

function range(s,e){ const r=[]; for(let i=s;i<e;i++) r.push(i); return r; }

// ─── STATE ───
let currentVariant = null;
let questions = [];
let currentIdx = 0;
let score = 0;
let answered = 0;

// ─── INIT ───
function buildVariantCards(){
  const grid = document.getElementById('variantGrid');
  grid.innerHTML = '';
  VARIANTS.forEach(v => {
    const card = document.createElement('div');
    card.className = 'variant-card';
    card.innerHTML = `
      <div class="variant-num" style="color:${v.color}">${v.num}</div>
      <div class="variant-label">${v.label}</div>
      <div class="variant-range">${v.range}</div>
    `;
    card.onclick = () => startVariant(v);
    grid.appendChild(card);
  });
}

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

function startVariant(v){
  currentVariant = v;
  // Take questions for this variant and shuffle them
  questions = shuffle(v.indices.map(i => ALL_QUESTIONS[i]));
  currentIdx = 0; score = 0; answered = 0;

  document.getElementById('landing').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'flex';

  document.getElementById('variantBadge').textContent = v.label;
  document.getElementById('variantBadge').style.borderColor = v.color+'80';
  document.getElementById('variantBadge').style.color = v.color;

  showQuestion();
}

function showQuestion(){
  const q = questions[currentIdx];
  const total = questions.length;

  document.getElementById('qNumber').textContent = `SAVOL ${String(currentIdx+1).padStart(2,'0')}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressText').textContent = `${currentIdx+1} / ${total}`;
  document.getElementById('progressFill').style.width = `${((currentIdx)/total)*100}%`;

  // Build shuffled options
  const opts = shuffle([
    { text: q.correct, isCorrect: true },
    ...q.wrong.map(w => ({ text: w, isCorrect: false }))
  ]);

  const letters = ['A', 'B', 'C', 'D'];
  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt.text}</span>`;
    btn.onclick = () => selectAnswer(btn, opt.isCorrect, q.correct, list);
    list.appendChild(btn);
  });

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box';
  fb.innerHTML = '';

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.className = 'next-btn';
  nextBtn.textContent = currentIdx === questions.length-1 ? 'Natijani ko\'rish →' : 'Keyingi savol →';

  // re-animate card
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'fadeUp 0.35s ease';
}

function selectAnswer(btn, isCorrect, correctText, list){
  // Disable all
  list.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if(b.querySelector('span:last-child').textContent === correctText){
      b.classList.add('correct');
    }
  });

  const fb = document.getElementById('feedbackBox');
  if(isCorrect){
    btn.classList.add('correct');
    score++;
    fb.className = 'feedback-box correct-fb show';
    fb.innerHTML = '<strong>✓ To\'g\'ri!</strong>Siz to\'g\'ri javobni tanladingiz.';
  } else {
    btn.classList.add('wrong');
    fb.className = 'feedback-box wrong-fb show';
    fb.innerHTML = `<strong>✗ Noto'g'ri.</strong>To'g'ri javob: <em>${correctText}</em>`;
  }
  answered++;
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){
  currentIdx++;
  if(currentIdx >= questions.length){
    showResult();
  } else {
    showQuestion();
  }
}

function showResult(){
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'flex';

  const total = questions.length;
  const pct = Math.round((score/total)*100);

  const scoreEl = document.getElementById('resultScore');
  scoreEl.textContent = score;
  scoreEl.className = 'result-score ' + (pct>=80 ? 'great' : pct>=50 ? 'ok' : 'low');

  document.getElementById('totalQ').textContent = total;
  document.getElementById('correctCount').textContent = score;
  document.getElementById('wrongCount').textContent = total-score;

  let msg = '';
  if(pct>=90) msg = "Ajoyib! Siz materialni a'lo darajada o'zlashtirdingiz.";
  else if(pct>=75) msg = "Yaxshi natija! Bir necha mavzularni takrorlashingiz tavsiya etiladi.";
  else if(pct>=50) msg = "O'rtacha natija. Asosiy mavzularni qayta ko'rib chiqing.";
  else msg = "Materialni qayta o'rganish kerak. Yana bir bor urinib ko'ring!";
  document.getElementById('resultMsg').textContent = msg;
}

function retryVariant(){
  if(currentVariant) startVariant(currentVariant);
}

function goHome(){
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
}

// ─── BOOT ───
buildVariantCards();
</script>
